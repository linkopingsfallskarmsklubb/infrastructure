apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-test
  annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls.certresolver: default
spec:
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: "/test"
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-test
                port:
                  number: 8081
  tls:
    - hosts:
      - {{ .Values.host }}
