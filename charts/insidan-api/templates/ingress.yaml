apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  annotations:
      traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ .Release.Name }}@kubernetescrd
spec:
  rules:
    - host: insidan.linkopingsfallskarmsklubb.se
      http:
        paths:
          - path: "/api"
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  number: 8000
  tls:
    - hosts:
      - insidan.linkopingsfallskarmsklubb.se
