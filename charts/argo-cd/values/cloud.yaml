host: argocd.linkopingsfallskarmsklubb.se
path: /
argo-cd:
  dex:
    enabled: true
  server:
    env:
      - name: ARGOCD_SERVER_DEX_SERVER_INSECURE
        value: "true"
  configs:
    params:
      server.insecure: "true"
      dex.server.insecure: "true"
    cm:
      url: https://argocd.linkopingsfallskarmsklubb.se
      dex.config: |
        connectors:
        - type: oidc
          id: authelia
          name: Authelia
          config:
            issuer: https://auth.linkopingsfallskarmsklubb.se
            clientID: argocd
            clientSecret: $argo-cd-custom-secrets:dex.authelia.clientSecret
            redirectURI: https://argocd.linkopingsfallskarmsklubb.se/api/dex/callback
            scopes:
              - openid
              - profile
              - email
              - groups
            getUserInfo: true
            insecureEnableGroups: true
            claimMapping:
              groups: groups
    rbac:
      policy.default: ""
      scopes: "[groups]"
      policy.csv: |
        p, role:admin, applications, *, *, allow
        g, admins, role:admin
