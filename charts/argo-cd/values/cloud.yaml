host: insidan.linkopingsfallskarmsklubb.se
argo-cd:
  dex:
    enabled: true
  server:
    env:
      - name: ARGOCD_SERVER_DEX_SERVER_INSECURE
        value: "true"
  configs:
    params:
      server.rootpath: "/argocd"
      server.insecure: "true"
      dex.server.insecure: "true"
    cm:
      url: https://insidan.linkopingsfallskarmsklubb.se/argocd
      oidc.config: |
        name: LFK
        issuer: https://insidan.linkopingsfallskarmsklubb.se/argocd/api/dex
        clientID: argocd
        clientSecret: $argo-cd-custom-secrets:dex.authelia.clientSecret
        requestedScopes: ["openid", "profile", "email", "groups"]
      dex.config: |
        connectors:
        - type: oidc
          id: lfk
          name: LFK Account
          config:
            issuer: https://auth.linkopingsfallskarmsklubb.se
            clientID: argocd
            clientSecret: $argo-cd-custom-secrets:dex.authelia.clientSecret
            redirectURI: https://insidan.linkopingsfallskarmsklubb.se/argocd/api/dex/callback
            scopes:
              - openid
              - profile
              - email
              - groups
            getUserInfo: true
    rbac:
      policy.default: ""
      policy.csv: |
        p, role:admin, applications, *, *, allow
        g, admins, role:admin
