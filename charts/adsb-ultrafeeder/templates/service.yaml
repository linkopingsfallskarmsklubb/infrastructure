apiVersion: v1
kind: Service
metadata:
  name: adsb-ultrafeeder
  labels:
    app: adsb-ultrafeeder
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: web
      protocol: TCP
      name: web
    - port: 30047
      targetPort: json-stream
      protocol: TCP
      name: json-stream
  selector:
    app: adsb-ultrafeeder
