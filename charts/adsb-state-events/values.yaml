image:
  containerRegistry: europe-west1-docker.pkg.dev
  repository: bitnami-ch3rudc/docker/adsbstateevents
  tag: 0.4.2
  pullPolicy: Always

replicaCount: 1

secretStore: secret-store

insidan:
  apiUrl: "https://insidan.linkopingsfallskarmsklubb.se/api/adsb/event"
  tokenUrl: "https://auth.linkopingsfallskarmsklubb.se/api/oidc/token"
  clientId: "adsb-state-events"
  clientSecretRef: "authelia-client-adsb-state-events-secret"

feeder:
  address: "adsb-ultrafeeder.core.svc.cluster.local:30047"
  targetHex: "4ab4af"

track:
  liftAltitudeMin: 500.0
  liftDuration: 5s
  dropMinPeakAltitude: 2300.0
  dropAltitudeDelta: 500.0
  dropDuration: 5s
  landAltitudeMax: 1000.0
  landTimeout: 10s
  lostToLandedTimeout: 5m
  updateInterval: 1s

debug: true

simulator:
  enabled: false
  schedule: "0 0 31 2 *"
  image: python:3.14-alpine

hostAliases: []

caSecret: ""
