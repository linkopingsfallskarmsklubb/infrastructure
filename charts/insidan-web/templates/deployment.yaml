{{- if not .Values.proxy }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      {{- if or .Values.hostAliases .Values.global }}
      hostAliases:
        {{- if and .Values.global .Values.global.traefikIp }}
        - ip: {{ .Values.global.traefikIp | quote }}
          hostnames:
            {{- range .Values.hostAliases }}
            {{- toYaml .hostnames | nindent 12 }}
            {{- end }}
        {{- else }}
        {{- toYaml .Values.hostAliases | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.image.containerRegistry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.caSecret }}
          env:
            - name: SSL_CERT_FILE
              value: "/etc/ssl/certs/ca.crt"
            - name: NODE_EXTRA_CA_CERTS
              value: "/etc/ssl/certs/ca.crt"
          {{- end }}
          volumeMounts:
            {{- if .Values.caSecret }}
            - name: ca-cert
              mountPath: /etc/ssl/certs/ca.crt
              subPath: ca.crt
              readOnly: true
            {{- end }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
      {{- if .Values.caSecret }}
      volumes:
        - name: ca-cert
          secret:
            secretName: {{ .Values.caSecret }}
      {{- end }}
{{- end }}
