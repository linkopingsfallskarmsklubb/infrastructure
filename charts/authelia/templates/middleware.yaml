apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authelia
  namespace: {{ .Release.Namespace }}
spec:
  forwardAuth:
    address: http://authelia.{{ .Release.Namespace }}.svc.cluster.local/api/authz/forward-auth?authelia_url=https://auth.linkopingsfallskarmsklubb.se/
    trustForwardHeader: true
    authResponseHeaders:
      - Remote-User
      - Remote-Groups
      - Remote-Name
      - Remote-Email
