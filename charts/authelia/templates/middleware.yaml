apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authelia
  namespace: {{ .Release.Namespace }}
spec:
  forwardAuth:
    address: http://authelia.{{ .Release.Namespace }}.svc.cluster.local/api/authz/forward-auth?authelia_url={{ if .Values.authelia.ingress.tls.enabled }}https{{ else }}http{{ end }}://{{ (index .Values.authelia.ingress.rulesOverride 0).host }}/
    trustForwardHeader: true
    authResponseHeaders:
      - Remote-User
      - Remote-Groups
      - Remote-Name
      - Remote-Email
