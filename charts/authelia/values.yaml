authelia:
  image:
    tag: "4.39.13"

  pod:
    extraVolumes:
      - name: custom-assets
        configMap:
          name: authelia-custom-assets

    extraVolumeMounts:
      - name: custom-assets
        mountPath: /config/assets/

  secret:
    existingSecret: "authelia-secrets"
    additionalSecrets:
      authelia-secrets: {}

  configMap:
    theme: oled
    log:
      level: debug
    server:
      asset_path: /config/assets/
    authentication_backend:
      password_reset:
        disable: true
      ldap:
        enabled: true
        address: "ldap://lldap:3890"
        implementation: "custom"
        timeout: "5 seconds"
        start_tls: false
        base_dn: "dc=linkopingsfallskarmsklubb,dc=se"
        additional_users_dn: "ou=people"
        users_filter: "(&(|({username_attribute}={input})(mail={input}))(objectClass=person))"
        additional_groups_dn: "ou=groups"
        groups_filter: "(member={dn})"
        attributes:
          display_name: "displayName"
          username: "uid"
          mail: "mail"
          group_name: "cn"
        user: "uid=admin,ou=people,dc=linkopingsfallskarmsklubb,dc=se"
        password:
          secret_name: "authelia-secrets"
          path: "ldap-password"

    storage:
      encryption_key:
        secret_name: "authelia-secrets"
        path: "storage-encryption-key"
      postgres:
        enabled: true
        address: "tcp://pg.core.svc.cluster.local:5432"
        database: "authelia"
        username: "authelia"
        password:
          secret_name: "authelia-secrets"
          path: "postgres-password"

    session:
      name: "authelia_session"
      remember_me: "7 days"
      cookies:
        - domain: "linkopingsfallskarmsklubb.se"
          authelia_url: "https://auth.linkopingsfallskarmsklubb.se"
      encryption_key:
        secret_name: "authelia-secrets"
        path: "session-secret"

    identity_validation:
      reset_password:
        secret:
          secret_name: "authelia-secrets"
          path: "jwt-secret"

    password_policy:
      standard:
        enabled: true
        min_length: 12
        require_uppercase: false
        require_lowercase: false
        require_number: false
        require_special: false

    identity_providers:
      oidc:
        enabled: true
        hmac_secret:
          secret_name: "authelia-secrets"
          path: "oidc-hmac-secret"
        jwks:
          - key:
              path: "/secrets/authelia-secrets/oidc-issuer-private-key"
        authorization_policies:
          argocd_policy:
            default_policy: 'deny'
            rules:
              - policy: 'one_factor'
                subject:
                  - 'group:admins'
          skywinone_policy:
            default_policy: 'deny'
            rules:
              - policy: 'one_factor'
                subject:
                  - 'group:skywin_users'
          insidan_policy:
            default_policy: 'deny'
            rules:
              - policy: 'one_factor'
                subject:
                  - 'group:users'
        clients:
          - client_id: "argocd"
            client_name: "ArgoCD"
            consent_mode: "implicit"
            pre_configured_consent_duration: "1y"
            client_secret:
              path: "/secrets/authelia-secrets/client-argocd-secret"
            public: false
            authorization_policy: "argocd_policy"
            redirect_uris:
              - "https://insidan.linkopingsfallskarmsklubb.se/argocd/api/dex/callback"
            scopes: ["openid", "profile", "email", "groups"]
            grant_types: ["authorization_code"]
            userinfo_signed_response_alg: "none"
          - client_id: "skywinone"
            client_name: "Skywin One"
            consent_mode: "implicit"
            pre_configured_consent_duration: "1y"
            client_secret:
              path: "/secrets/authelia-secrets/client-skywinone-secret"
            public: false
            authorization_policy: "skywinone_policy"
            redirect_uris:
              - "https://insidan.linkopingsfallskarmsklubb.se/skywinone/oidc/callback"
              - "https://insidan.linkopingsfallskarmsklubb.se/skywinone/oidc/callback/"
            scopes: ["openid", "profile", "email", "groups"]
            grant_types: ["authorization_code"]
            token_endpoint_auth_method: "client_secret_post"
            userinfo_signed_response_alg: "none"
          - client_id: "insidan"
            client_name: "Insidan"
            consent_mode: "implicit"
            pre_configured_consent_duration: "1y"
            client_secret:
              path: "/secrets/authelia-secrets/client-insidan-secret"
            public: false
            authorization_policy: "insidan_policy"
            redirect_uris:
              - "https://insidan.linkopingsfallskarmsklubb.se/api/auth/callback"
              - "https://insidan.linkopingsfallskarmsklubb.se/auth/callback"
            scopes: ["openid", "profile", "email", "groups"]
            grant_types: ["authorization_code"]
            userinfo_signed_response_alg: "none"

    notifier:
      filesystem:
        enabled: true
        filename: "/config/notification.txt"

    access_control:
      default_policy: "deny"
      rules:
        # 1. Rules for the Authelia portal itself
        - domain: "auth.linkopingsfallskarmsklubb.se"
          resources: ["^/api/oidc/authorization.*"]
          policy: "bypass"
        - domain: "auth.linkopingsfallskarmsklubb.se"
          subject: ["group:users"]
          policy: "one_factor"

        # 2. Tightened rules for insidan
        - domain: "insidan.linkopingsfallskarmsklubb.se"
          resources: ["^/argocd($|/.*)"]
          subject: ["group:admins"]
          policy: "one_factor"
        - domain: "insidan.linkopingsfallskarmsklubb.se"
          resources: ["^/skywinone($|/.*)"]
          subject: ["group:skywin_users"]
          policy: "one_factor"
        - domain: "insidan.linkopingsfallskarmsklubb.se"
          resources: ["^/($|api/.*|auth/callback.*)"]
          subject: ["group:users"]
          policy: "one_factor"

        # 3. Deny everything else on insidan explicitly
        - domain: "insidan.linkopingsfallskarmsklubb.se"
          policy: "deny"

        # 4. Localhost development
        - domain: "localhost"
          subject: ["group:admins"]
          policy: "one_factor"

  ingress:
    enabled: true
    traefikCRD:
      enabled: true
      disableIngressRoute: true
    className: "traefik"
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls.certresolver: default
    rulesOverride:
      - host: auth.linkopingsfallskarmsklubb.se
        path: /
    tls:
      enabled: true
      secret: authelia-tls

secretStore: secret-store

# Secrets references in GCP SM
secrets:
  jwtSecret: authelia-jwt-secret
  sessionSecret: authelia-session-secret
  storageEncryptionKey: authelia-storage-encryption-key
  oidcIssuerPrivateKey: authelia-oidc-issuer-private-key
  oidcHmacSecret: authelia-oidc-hmac-secret
  postgresPassword: authelia-postgres-password
  lldapAdminPassword: lldap-user-pass

# OIDC Clients
clients:
  - id: argocd
    name: ArgoCD
    secretRef: authelia-client-argocd-secret
    redirect_uris:
      - https://insidan.linkopingsfallskarmsklubb.se/argocd/api/dex/callback
  - id: skywinone
    name: Skywin One
    secretRef: authelia-client-skywinone-secret
    redirect_uris:
      - https://insidan.linkopingsfallskarmsklubb.se/skywinone/oidc/callback
  - id: insidan
    name: Insidan
    secretRef: authelia-client-insidan-secret
    redirect_uris:
      - https://insidan.linkopingsfallskarmsklubb.se/api/auth/callback
