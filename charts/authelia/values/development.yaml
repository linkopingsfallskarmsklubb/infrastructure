authelia:
  configMap:
    theme: oled
    session:
      remember_me: "7 days"
      cookies:
        - domain: "linkopingsfallskarmsklubb.localhost"
          subdomain: "auth"
    identity_providers:
      oidc:
        clients:
          - client_id: "insidan"
            client_name: "Insidan"
            consent_mode: "implicit"
            pre_configured_consent_duration: "1y"
            client_secret:
              path: "/secrets/authelia-secrets/client-insidan-secret"
            public: false
            authorization_policy: "one_factor"
            redirect_uris:
              - "http://localhost:3000/api/auth/callback"
              - "http://localhost:8000/api/auth/callback"
              - "https://insidan.linkopingsfallskarmsklubb.localhost/api/auth/callback"
            scopes: ["openid", "profile", "email", "groups"]
            grant_types: ["authorization_code"]
          - client_id: "argocd"
            client_name: "ArgoCD"
            consent_mode: "implicit"
            pre_configured_consent_duration: "1y"
            client_secret:
              path: "/secrets/authelia-secrets/client-argocd-secret"
            public: false
            authorization_policy: "argocd_policy"
            redirect_uris:
              - "https://argocd.linkopingsfallskarmsklubb.localhost/api/dex/callback"
            scopes: ["openid", "profile", "email", "groups"]
            grant_types: ["authorization_code"]
          - client_id: "skywinone"
            client_name: "Skywin One"
            consent_mode: "implicit"
            pre_configured_consent_duration: "1y"
            client_secret:
              path: "/secrets/authelia-secrets/client-skywinone-secret"
            public: false
            authorization_policy: "one_factor"
            redirect_uris:
              - "https://insidan.linkopingsfallskarmsklubb.localhost/skywinone/oidc/callback"
            scopes: ["openid", "profile", "email", "groups"]
            grant_types: ["authorization_code"]
            token_endpoint_auth_method: "client_secret_post"
          - client_id: "adsb-state-events"
            client_name: "ADSB State Events"
            client_secret:
              path: "/secrets/authelia-secrets/client-adsb-state-events-secret"
            public: false
            authorization_policy: "one_factor"
            claims_policy: "adsb_state_events_claims"
            scopes: ["profile", "email", "groups"]
            grant_types: ["client_credentials"]
    access_control:
      rules:
        - domain: "*.linkopingsfallskarmsklubb.localhost"
          policy: "one_factor"

  ingress:
    enabled: true
    traefikCRD:
      enabled: true
      disableIngressRoute: true
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      # Disable self-protection to avoid 404/loops
      traefik.ingress.kubernetes.io/router.middlewares: ""
    rulesOverride:
      - host: auth.linkopingsfallskarmsklubb.localhost
        path: /
    tls:
      enabled: true
  pod:
    env:
      - name: AUTHELIA_SERVER_TRUSTED_PROXIES
        value: "0.0.0.0/0"
