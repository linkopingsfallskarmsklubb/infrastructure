mode: ContinuousDeployment
next-version: 0.2.0
major-version-bump-message: "(?i)^breaking(:|\\()|BREAKING CHANGE"
minor-version-bump-message: "(?i)^feat(:|\\()"
patch-version-bump-message: "(?i)^fix(:|\\()"
branches:
  main:
    regex: ^main$
    mode: ContinuousDeployment
    label: ''
    increment: Patch
    track-merge-target: false
    tracks-release-branches: false
    is-release-branch: false
ignore:
  sha: []
  paths:
    - '^(?!apps/skywinone/).*'
