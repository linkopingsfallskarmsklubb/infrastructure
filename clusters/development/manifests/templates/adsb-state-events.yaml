apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adsb-state-events
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/linkopingsfallskarmsklubb/infrastructure
    path: charts/adsb-state-events
    targetRevision: {{ .Values.revision }}
    helm:
      valueFiles:
        - values/development.yaml
      {{- if and .Values.global .Values.global.traefikIp }}
      values: |
        global:
          traefikIp: {{ .Values.global.traefikIp | quote }}
      {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
