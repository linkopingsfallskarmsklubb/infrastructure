apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/linkopingsfallskarmsklubb/infrastructure
    path: charts/argo-cd
    targetRevision: {{ .Values.revision }}
    helm:
      valueFiles:
        - values/development.yaml
      {{- if and .Values.global .Values.global.traefikIp }}
      values: |
        global:
          traefikIp: {{ .Values.global.traefikIp | quote }}
        argo-cd:
          global:
            hostAliases:
              - ip: {{ .Values.global.traefikIp | quote }}
                hostnames:
                  - "auth.linkopingsfallskarmsklubb.localhost"
                  - "argocd.linkopingsfallskarmsklubb.localhost"
          dex:
            enabled: true
      {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /spec/data/0/remoteRef/conversionStrategy
        - /spec/data/0/remoteRef/decodingStrategy
        - /spec/data/0/remoteRef/metadataPolicy
        - /spec/target/deletionPolicy
        - /spec/target/template/engineVersion
        - /spec/target/template/mergePolicy
