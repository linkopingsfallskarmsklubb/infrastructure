version: 2
registries:
  google-artifact-registry:
    type: docker-registry
    url: https://europe-west1-docker.pkg.dev
    replaces-base: true
    username: _json_key
    password: ${{ secrets.GCP_SA_KEY }}
updates:
  # Docker
  - package-ecosystem: "docker"
    directory: "/apps/db-tools"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directory: "/apps/skywinone"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directory: "/apps/ellen"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directory: "/apps/weather"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"

  # Helm
  - package-ecosystem: "helm"
    directory: "/charts/acme-sync"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "helm"
    directory: "/charts/argo-cd"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "helm"
    directory: "/charts/authelia"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "helm"
    directory: "/charts/db-tools"
    schedule:
      interval: "daily"
    registries:
      - google-artifact-registry
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "helm"
    directory: "/charts/insidan-api"
    schedule:
      interval: "daily"
    registries:
      - google-artifact-registry
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "helm"
    directory: "/charts/insidan-web"
    schedule:
      interval: "daily"
    registries:
      - google-artifact-registry
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "helm"
    directory: "/charts/lldap"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "helm"
    directory: "/charts/mysql"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "helm"
    directory: "/charts/postgres"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "helm"
    directory: "/charts/secret-store"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "helm"
    directory: "/charts/skywinone"
    schedule:
      interval: "daily"
    registries:
      - google-artifact-registry
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "helm"
    directory: "/charts/ellen"
    schedule:
      interval: "daily"
    registries:
      - google-artifact-registry
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "helm"
    directory: "/charts/weather"
    schedule:
      interval: "weekly"
    registries:
      - google-artifact-registry
    groups:
      dependencies:
        patterns:
          - "*"

  # Python
  - package-ecosystem: "pip"
    directory: "/apps/weather"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "pip"
    directory: "/apps/ellen"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
