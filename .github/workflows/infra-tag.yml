name: infra-tag

on:
  # push:
  #   branches: ["main"]
  #   paths:
  #     - "charts/**"
  #     - "clusters/**"
  #     - "GitVersion.yml"
  #     - "!**/root-app.yaml"
  workflow_dispatch:

jobs:
  tag:
    name: Tag Infrastructure
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Identify Latest Infra Commit
        id: infra_commit
        run: |
          COMMIT=$(git log -1 --format=%H -- "charts/" "clusters/" "GitVersion.yml" ":(exclude)**/root-app.yaml")
          echo "sha=$COMMIT" >> $GITHUB_OUTPUT

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: "6.x"

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: infra/${{ steps.gitversion.outputs.majorMinorPatch }}
          name: infra ${{ steps.gitversion.outputs.majorMinorPatch }}
          target_commitish: ${{ steps.infra_commit.outputs.sha }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
